<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>illustro - Illustration Search</title>
<style>
  :root {
    --bg: #14151a; --panel: #1d1f27; --panel2: #262934;
    --fg: #e8e9ee; --muted: #9aa0ad; --accent: #8a7cff; --accent2: #ff7cc3;
    --line: #2d313d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
  header { position: sticky; top: 0; z-index: 20; background: rgba(20,21,26,.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); padding: 12px 18px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .logo { font-weight: 700; letter-spacing: .5px; margin-right: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  input#q { flex: 1; min-width: 220px; background: var(--panel2); border: 1px solid var(--line);
    color: var(--fg); padding: 10px 14px; border-radius: 10px; font-size: 15px; outline: none; }
  input#q:focus { border-color: var(--accent); }
  button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    padding: 9px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); border: none; color: #fff; }
  .chips { gap: 6px; margin-top: 8px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 999px; background: var(--panel2);
    border: 1px solid var(--line); cursor: pointer; user-select: none; }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.exc { background: #5a2330; border-color: #7a3040; color: #ffd7df; }
  .meta { color: var(--muted); font-size: 13px; margin: 10px 18px 0; }
  #grid { columns: 240px; column-gap: 12px; padding: 14px 18px 60px; }
  .card { break-inside: avoid; margin-bottom: 12px; position: relative; border-radius: 12px;
    overflow: hidden; background: var(--panel); cursor: zoom-in; border: 1px solid var(--line); }
  .card img { width: 100%; display: block; }
  .card .rt { position: absolute; top: 6px; right: 6px; font-size: 10px; padding: 2px 6px;
    border-radius: 6px; background: rgba(0,0,0,.6); color: #fff; }
  .more { display: block; margin: 10px auto 40px; }
  /* modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none;
    z-index: 40; padding: 24px; }
  .modal.open { display: flex; gap: 20px; }
  .modal .imgwrap { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
  .modal img { max-width: 100%; max-height: calc(100vh - 48px); border-radius: 10px; }
  .side { width: 340px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px; overflow-y: auto; max-height: calc(100vh - 48px); }
  .side h3 { margin: 0 0 4px; font-size: 14px; color: var(--muted); }
  .tag { display: inline-block; margin: 3px 4px 0 0; padding: 3px 8px; border-radius: 8px;
    font-size: 12px; background: var(--panel2); border: 1px solid var(--line); cursor: pointer; }
  .tag.char { background: #2a2140; border-color: #4a3a7a; }
  .tag .c { color: var(--muted); font-size: 10px; margin-left: 4px; }
  .close { position: absolute; top: 16px; right: 22px; font-size: 26px; cursor: pointer; color: #fff; }
  /* stats */
  #stats { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 50; display: none;
    overflow-y: auto; padding: 30px; }
  #stats.open { display: block; }
  .scard { max-width: 1000px; margin: 0 auto; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 22px; }
  .kpis { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .kpi { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 18px; min-width: 120px; }
  .kpi b { font-size: 24px; display: block; }
  .bar { height: 18px; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .brow { display: grid; grid-template-columns: 120px 1fr 50px; gap: 8px; align-items: center;
    margin: 4px 0; font-size: 13px; }
  .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; vertical-align: middle; }
  a { color: var(--accent); }
  .worker { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-left:auto; }
  .wdot { width:8px; height:8px; border-radius:50%; background:var(--muted); display:inline-block; flex:none; }
  .wdot.run { background:#37d67a; animation: wpulse 1.2s infinite; }
  .wdot.pause { background:#f5a524; }
  .wdot.sleep { background:#4aa3a3; }
  .wdot.stop { background:#888; }
  @keyframes wpulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  .worker button { padding:3px 9px; font-size:11px; }
</style>
</head>
<body>
<header>
  <div class="row">
    <span class="logo">illustro</span>
    <input id="q" placeholder="Search: blue_hair school_uniform ... (space-separated)" />
    <button class="primary" onclick="doSearch()">Search</button>
    <button onclick="openStats()">Stats</button>
    <span id="worker" class="worker"></span>
  </div>
  <div class="row chips" id="ratingChips">
    <span class="chip" data-r="general">general</span>
    <span class="chip" data-r="sensitive">sensitive</span>
    <span class="chip" data-r="questionable">questionable</span>
    <span class="chip" data-r="explicit">explicit</span>
    <span style="flex:1"></span>
    <span class="chip" id="excHint" title="Click a tag in results to filter; Shift+click to exclude">Tag filtering</span>
  </div>
  <div class="row chips" id="activeTags"></div>
</header>

<div class="meta" id="meta"></div>
<div id="grid"></div>
<button class="more" id="moreBtn" style="display:none" onclick="loadMore()">Load more</button>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">✕</span>
  <div class="imgwrap"><img id="mimg" src="" /></div>
  <div class="side" id="mside"></div>
</div>

<div id="stats"><span class="close" onclick="closeStats()">✕</span><div class="scard" id="statsBody"></div></div>

<script>
const state = { include: [], exclude: [], rating: [], page: 1, total: 0, q: "" };

function ratingChipSetup() {
  document.querySelectorAll('#ratingChips .chip[data-r]').forEach(c => {
    c.onclick = () => {
      const r = c.dataset.r;
      if (state.rating.includes(r)) { state.rating = state.rating.filter(x => x !== r); c.classList.remove('on'); }
      else { state.rating.push(r); c.classList.add('on'); }
      doSearch();
    };
  });
}
ratingChipSetup();
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function renderActiveTags() {
  const box = document.getElementById('activeTags'); box.innerHTML = '';
  state.include.forEach(t => box.appendChild(mkChip(t, 'on', () => { state.include = state.include.filter(x=>x!==t); doSearch(); })));
  state.exclude.forEach(t => box.appendChild(mkChip('−'+t, 'exc', () => { state.exclude = state.exclude.filter(x=>x!==t); doSearch(); })));
}
function mkChip(label, cls, onclick) {
  const s = document.createElement('span'); s.className = 'chip ' + cls; s.textContent = label + ' ✕'; s.onclick = onclick; return s;
}

function addTag(name, exclude) {
  if (exclude) { if (!state.exclude.includes(name)) state.exclude.push(name); }
  else { if (!state.include.includes(name)) state.include.push(name); }
  doSearch();
}

async function doSearch() {
  state.q = document.getElementById('q').value.trim();
  state.page = 1;
  renderActiveTags();
  const data = await fetchPage();
  document.getElementById('grid').innerHTML = '';
  renderResults(data, true);
}

async function loadMore() { state.page++; const data = await fetchPage(); renderResults(data, false); }

async function fetchPage() {
  const p = new URLSearchParams({ q: state.q, include: state.include.join(','),
    exclude: state.exclude.join(','), rating: state.rating.join(','), page: state.page });
  const r = await fetch('/api/search?' + p.toString());
  return r.json();
}

function renderResults(data, fresh) {
  state.total = data.total;
  const m = [];
  if (data.matched_tags.length) m.push('Matched tags: ' + data.matched_tags.join(', '));
  m.push(`${data.total} images` + (data.mode === 'any' ? ' (any match)' : ''));
  if (data.residual && data.residual.length) m.push('Unrecognized: ' + data.residual.join(', '));
  document.getElementById('meta').textContent = m.join('　·　');
  const grid = document.getElementById('grid');
  data.images.forEach(img => grid.appendChild(card(img)));
  const shown = state.page * data.page_size;
  document.getElementById('moreBtn').style.display = shown < data.total ? 'block' : 'none';
}

function card(img) {
  const d = document.createElement('div'); d.className = 'card';
  const im = document.createElement('img'); im.loading = 'lazy'; im.src = '/api/thumb/' + img.id;
  if (img.width && img.height) im.style.aspectRatio = img.width + '/' + img.height;
  d.appendChild(im);
  if (img.rating && img.rating !== 'general') { const rt = document.createElement('span'); rt.className='rt'; rt.textContent = img.rating[0].toUpperCase(); d.appendChild(rt); }
  d.onclick = () => openModal(img);
  return d;
}

function openModal(img) {
  document.getElementById('mimg').src = '/api/image/' + img.id;
  const side = document.getElementById('mside');
  const tagsHtml = (img.tags || []).map(t => {
    const label = t.zh ? t.zh : t.name;
    return `<span class="tag ${t.cat===4?'char':''}" data-n="${t.name}">${label}<span class="c">${t.conf}</span></span>`;
  }).join('');
  side.innerHTML = `
    <h3>Rating</h3><div>${img.rating || '-'}  ${img.width}x${img.height}  <span class="swatch" style="background:${img.avg_color}"></span> ${img.avg_color||''}</div>
    <div style="margin:12px 0"><button class="primary" onclick="findSimilar(${img.id})">Find similar</button>
    <button onclick="window.open('/api/image/${img.id}')">Original</button></div>
    <h3>Tags (click = filter, Shift+click = exclude)</h3><div id="mtags">${tagsHtml}</div>`;
  side.querySelectorAll('.tag').forEach(el => el.onclick = (e) => { addTag(el.dataset.n, e.shiftKey); closeModal(); });
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

async function findSimilar(id) {
  closeModal();
  const r = await fetch('/api/similar?id=' + id + '&k=40'); const data = await r.json();
  document.getElementById('meta').textContent = `${data.images.length} images similar to #${id} (vector nearest neighbor)`;
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  data.images.forEach(img => grid.appendChild(card(img)));
  document.getElementById('moreBtn').style.display = 'none';
  window.scrollTo(0, 0);
}

async function openStats() {
  document.getElementById('stats').classList.add('open');
  const s = await (await fetch('/api/stats')).json();
  const bars = (arr, key, max) => arr.map(x => {
    const label = x.zh || x.name || x.color;
    return `<div class="brow"><span>${label}</span><span class="bar" style="width:${Math.max(4, 100*x.count/max)}%"></span><span>${x.count}</span></div>`;
  }).join('');
  const gmax = Math.max(1, ...s.top_general.map(x=>x.count));
  const cmax = Math.max(1, ...(s.top_characters.length?s.top_characters:[{count:1}]).map(x=>x.count));
  const pmax = Math.max(1, ...s.palette.map(x=>x.count));
  document.getElementById('statsBody').innerHTML = `
    <h2 style="margin-top:0">Collection Analytics</h2>
    <div class="kpis">
      <div class="kpi"><b>${s.total}</b>Total</div>
      <div class="kpi"><b>${s.tagged}</b>Tagged</div>
      <div class="kpi"><b>${s.embedded}</b>Embedded</div>
      <div class="kpi"><b>${s.duplicates.images}</b>Duplicates (${s.duplicates.groups} groups)</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div><h3>Top 40 Tags</h3>${bars(s.top_general, 'general', gmax)}</div>
      <div>
        <h3>Top 30 Characters</h3>${s.top_characters.length?bars(s.top_characters,'char',cmax):'<p style="color:var(--muted)">No character tags yet</p>'}
        <h3 style="margin-top:18px">Dominant Colors</h3>${bars(s.palette,'color',pmax)}
        <h3 style="margin-top:18px">Orientation</h3>
        <div class="brow"><span>Portrait</span><span class="bar" style="width:${100*s.orientation.portrait/Math.max(1,s.total)}%"></span><span>${s.orientation.portrait}</span></div>
        <div class="brow"><span>Landscape</span><span class="bar" style="width:${100*s.orientation.landscape/Math.max(1,s.total)}%"></span><span>${s.orientation.landscape}</span></div>
        <div class="brow"><span>Square</span><span class="bar" style="width:${100*s.orientation.square/Math.max(1,s.total)}%"></span><span>${s.orientation.square}</span></div>
      </div>
    </div>`;
}
function closeStats() { document.getElementById('stats').classList.remove('open'); }

// -- Background worker status bar --
async function pollWorker() {
  try { renderWorker(await (await fetch('/api/worker')).json()); } catch (e) {}
}
function renderWorker(w) {
  const el = document.getElementById('worker');
  if (!w.enabled) { el.innerHTML = `<span class="wdot stop"></span>Indexed ${w.tagged}/${w.total}`; return; }
  const label = {running:'Processing', sleeping:'Idle', paused:'Paused', idle:'Idle', stopped:'Stopped'}[w.state] || w.state;
  const cls = {running:'run', sleeping:'sleep', paused:'pause', stopped:'stop'}[w.state] || '';
  const phZh = {tagging:'Tagging', scanning:'Scanning', indexing:'Indexing'}[w.phase] || '';
  let prog = (w.state === 'running' && w.progress_total) ? ` ${phZh} ${w.processed}/${w.progress_total}` : '';
  let btns = (w.state === 'paused')
    ? `<button onclick="workerAction('resume')">Resume</button>`
    : `<button onclick="workerAction('pause')">Pause</button>`;
  btns += `<button onclick="workerAction('run')">Process now</button>`;
  const err = w.last_error ? ` <span title="${w.last_error}">Warning</span>` : '';
  el.innerHTML = `<span class="wdot ${cls}"></span>${label}${prog} - Pending ${w.remaining}${err} ${btns}`;
}
async function workerAction(a) { await fetch('/api/worker/' + a, {method: 'POST'}); pollWorker(); }
setInterval(pollWorker, 3000); pollWorker();

// Initial view: browse mode
doSearch();
</script>
</body>
</html>
