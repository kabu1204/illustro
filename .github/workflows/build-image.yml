name: build-image

# Build illustro image in the cloud and push to GitHub Container Registry (ghcr.io).
# No local Docker needed: push code to GitHub and it builds + pushes automatically.
# Result: ghcr.io/<your-username>/illustro:latest  (N100 is x86_64, so linux/amd64 is sufficient)

on:
  push:
    branches: [main]
    paths:
      - "illustro/**"
      - "server/**"
      - "docker/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch: {}   # Can also be triggered manually from the Actions page

permissions:
  contents: read
  packages: write          # Required to push to ghcr

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Built-in token, no configuration needed

      - name: Compute image name and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/illustro
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
